name: Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-11-01
          targets: x86_64-unknown-uefi
          components: rust-src
          
      - name: Cargo Build
        run: cargo build --release --target x86_64-unknown-uefi -Z build-std=core,alloc --config "build.rustflags=['-A', 'warnings']"
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: result-efi
          path: target/x86_64-unknown-uefi/release/*.efi
