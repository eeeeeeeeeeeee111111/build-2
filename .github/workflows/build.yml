name: Build UEFI Mapper
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-11-01
          targets: x86_64-unknown-uefi
          components: rust-src
          
      - name: Build project
        # ใช้คำสั่ง build แบบระบุรายละเอียดครบในบรรทัดเดียว และปิดออปชันที่อาจทำให้เกิดบั๊ก
        run: |
          cargo build --release \
            --target x86_64-unknown-uefi \
            -Z build-std=core,alloc \
            --config "build.rustflags=['-A', 'warnings']"
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: valthrun-efi-result
          path: target/x86_64-unknown-uefi/release/*.efi
